<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkit · 规则市场</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="app" id="app"></div>
  <main>
    <div class="placeholder">
      <div class="placeholder-card">
        <h2>规则市场</h2>
        <p>下一阶段:<br>浏览、安装、编写 checkit 规则包,与 npm registry 集成。</p>
        <div>
          <span class="pill pill-accent">V2</span>
          <span class="pill">official rules</span>
          <span class="pill">community rules</span>
        </div>
        <p style="margin-top: 24px;">
          <a class="btn btn-primary" href="index.html">回到主控台</a>
        </p>
      </div>
    </div>
  </main>
  <script>
    (function() {
      function svg(path, size, sw) {
        size = size || 18; sw = sw || 1.6;
        return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="' + sw + '" stroke-linecap="round" stroke-linejoin="round">' + path + '</svg>';
      }
      function iconShield()    { return svg('<path d="M12 2.5 4.5 5.5v6c0 5 3.2 9.4 7.5 10.5 4.3-1.1 7.5-5.5 7.5-10.5v-6L12 2.5Z"/><path d="m9 12 2 2 4-4"/>'); }
      function iconDashboard() { return svg('<circle cx="12" cy="12" r="9"/><path d="M12 12 16 8"/><path d="M12 3v3 M12 18v3 M3 12h3 M18 12h3"/>'); }
      function iconGrid()      { return svg('<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>'); }
      function iconChat()      { return svg('<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>'); }
      function iconSettings()  { return svg('<path d="M4 6h16M4 12h16M4 18h10"/>'); }
      function iconSun()       { return svg('<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>'); }

      var active = 'rules-market';
      var tabs = [
        { id: 'dashboard', href: 'index.html', label: '主控台', icon: iconDashboard() },
        { id: 'rules-market', href: 'rules-market.html', label: '规则市场', icon: iconGrid() },
        { id: 'chat', href: 'chat.html', label: 'Chat', icon: iconChat() }
      ];
      var tabHtml = tabs.map(function (t) {
        return '<a class="rail-tab ' + (active === t.id ? 'active' : '') + '" href="' + t.href + '" title="' + t.label + '" aria-label="' + t.label + '">' + t.icon + '</a>';
      }).join('');

      document.getElementById('app').insertAdjacentHTML('afterbegin',
        '<header class="topbar">' +
        '<div class="brand"><div class="brand-logo">' + iconShield() + '</div>' +
        '<div class="brand-text"><div class="brand-title">Checkit Codebase Doctor</div>' +
        '<div class="brand-sub"><span class="branch-dot"></span> rules-market</div></div></div>' +
        '<div class="topbar-actions"><button class="btn btn-ghost" id="theme-toggle">' + iconSun() + '</button></div>' +
        '</header>' +
        '<aside class="rail" aria-label="主导航">' +
        '<a class="rail-brand" href="index.html">' + iconShield() + '</a>' +
        '<nav class="rail-tabs">' + tabHtml + '</nav>' +
        '<div class="rail-actions"><button class="rail-icon">' + iconSettings() + '</button></div>' +
        '</aside>');

      var stored = localStorage.getItem('checkit:theme');
      if (stored === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('theme-toggle').addEventListener('click', function () {
        var cur = document.documentElement.getAttribute('data-theme');
        var next = cur === 'dark' ? 'light' : 'dark';
        if (next === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        else document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('checkit:theme', next);
      });
    })();
  </script>
</body>
</html>
