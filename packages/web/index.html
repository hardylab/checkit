<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkit · 主控台</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- shell rendered by app.js -->
  </div>

  <main id="main">
    <!-- Initial empty state — dropzone -->
    <section class="dropzone" id="dropzone">
      <div class="dropzone-inner">
        <div style="color: var(--muted); margin-bottom: 12px;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <path d="m17 8-5-5-5 5"/>
            <path d="M12 3v12"/>
          </svg>
        </div>
        <h2>拖入 checkit 报告</h2>
        <p>把 <code>checkit --reporter json</code> 的输出文件拖到这里,或者:</p>
        <button class="btn btn-primary" type="button" id="pick-file">选择 JSON 文件</button>
        <input type="file" accept="application/json,.json" hidden />
        <p style="margin-top: 24px; font-size: 12px;">
          第一次使用?
          <code>cd 你的项目 &amp;&amp; pnpm exec checkit --reporter json &gt; report.json</code>
        </p>
      </div>
    </section>

    <!-- Loaded state — 3-pane dashboard -->
    <section class="dash" id="dashboard" hidden>
      <aside class="side-rail">
        <div class="side-eyebrow">体检项目</div>
        <nav class="cat-list" id="cat-list"></nav>
      </aside>

      <div class="dash-main">
        <div class="scan-summary">
          <div class="score-ring">
            <svg viewBox="0 0 100 100">
              <circle class="track" cx="50" cy="50" r="44"></circle>
              <circle class="bar"   cx="50" cy="50" r="44" id="score-bar"></circle>
            </svg>
            <div class="value">
              <span id="score-value">—</span>
              <small>健康度</small>
            </div>
          </div>
          <div class="summary-grid">
            <div class="summary-cell">
              <div class="summary-label">问题总数</div>
              <div class="summary-value" id="total-count">—</div>
            </div>
            <div class="summary-cell">
              <div class="summary-label">严重 / 警告 / 提示</div>
              <div class="summary-value" id="severity-counts">—</div>
            </div>
            <div class="summary-cell">
              <div class="summary-label">涉及文件</div>
              <div class="summary-value" id="files-count">—</div>
            </div>
            <div class="summary-cell">
              <div class="summary-label">可自动修复</div>
              <div class="summary-value" id="fixable-count">—</div>
            </div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 8px; align-items: flex-end;">
            <button class="btn btn-primary" type="button" id="ai-fix-all">一键 AI 修复 (n)</button>
            <button class="btn btn-ghost" type="button" id="clear-report">换一个文件</button>
          </div>
        </div>

        <div class="issue-tabs" id="severity-tabs">
          <button class="issue-tab active" data-level="all">全部 <span class="count" id="cnt-all">0</span></button>
          <button class="issue-tab" data-level="error">严重 <span class="count" id="cnt-error">0</span></button>
          <button class="issue-tab" data-level="warning">警告 <span class="count" id="cnt-warning">0</span></button>
          <button class="issue-tab" data-level="info">提示 <span class="count" id="cnt-info">0</span></button>
        </div>

        <ul class="issue-list" id="issue-list"></ul>
      </div>

      <aside class="dash-right" id="detail-panel">
        <div class="detail-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 8v4"/>
            <path d="M12 16h.01"/>
          </svg>
          <div>选择一个问题查看详情</div>
        </div>
      </aside>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
