[package]
name = "checkit"
version = "0.1.0"
edition = "2021"
description = "CheckIt - Best Practice Digitalization Engine"
license = "MIT"

[lib]
name = "checkit"
path = "src/lib.rs"

[[bin]]
name = "checkit-cli"
path = "src/cli/main.rs"

[dependencies]
# 异步运行时
tokio = { version = "1.35", features = ["full"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# 错误处理
thiserror = "1.0"
anyhow = "1.0"

# 日志
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# 正则表达式
regex = "1.10"

# 文件操作
walkdir = "2.4"
glob = "0.3"

# 时间
chrono = { version = "0.4", features = ["serde"] }

# UUID
uuid = { version = "1.6", features = ["v4", "serde"] }

# 并行处理
rayon = { version = "1.8", optional = true }

# 命令行
clap = { version = "4.4", features = ["derive"] }

# CPU 计数
num_cpus = "1.16"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tokio-test = "0.4"

[features]
default = ["parallel"]
parallel = ["rayon"]

# 性能优化配置
[profile.release]
lto = true
codegen-units = 1
opt-level = 3
