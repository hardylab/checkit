[package]
name = "checkit-tauri"
version = "0.1.0"
description = "CheckIt Desktop App"
authors = ["CheckIt Team"]
edition = "2021"

[lib]
name = "checkit_tauri_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[[bin]]
name = "checkit-app"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"

# 引用 checkit 核心库
checkit = { path = ".." }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
